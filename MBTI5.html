<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5">
    <title>人格镜像 · 深度投射</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', sans-serif;
            background: #f6f5f3;
            color: #1c1c1a;
            min-height: 100vh;
            padding: 32px 20px 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .app {
            max-width: 880px;
            width: 100%;
        }
        .header {
            margin-bottom: 32px;
            border-bottom: 1px solid #e8e6e2;
            padding-bottom: 20px;
        }
        .header h1 {
            font-size: 32px;
            font-weight: 600;
            letter-spacing: -0.01em;
            color: #1c1c1a;
        }
        .header p {
            font-size: 16px;
            color: #6b6a66;
            margin-top: 6px;
            font-weight: 400;
        }
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .lang-toggle {
            display: flex;
            gap: 6px;
        }
        .lang-btn {
            background: transparent;
            border: 1px solid #d0ceca;
            color: #6b6a66;
            padding: 4px 16px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.15s;
        }
        .lang-btn.active {
            background: #7a8fa6;
            border-color: #7a8fa6;
            color: #fff;
        }
        .lang-btn:active {
            transform: scale(0.94);
        }
        .progress-area {
            background: #e8e6e2;
            border-radius: 40px;
            height: 4px;
            width: 100%;
            margin: 8px 0 6px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: #7a8fa6;
            width: 0%;
            transition: width 0.35s ease;
        }
        .progress-stats {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            color: #6b6a66;
            margin-bottom: 24px;
        }
        .progress-stats span:last-child {
            color: #1c1c1a;
            font-weight: 500;
        }
        .question-card {
            background: #ffffff;
            border-radius: 20px;
            padding: 32px 28px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.02), 0 1px 2px rgba(0, 0, 0, 0.03);
            border: 1px solid #e8e6e2;
            margin-bottom: 20px;
        }
        .q-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            font-size: 13px;
            color: #8a8985;
        }
        .q-number {
            font-weight: 500;
        }
        .q-dimension {
            background: #f0efec;
            padding: 2px 14px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 500;
            color: #4a4a47;
        }
        .q-text {
            font-size: 20px;
            font-weight: 450;
            line-height: 1.7;
            margin: 12px 0 20px;
            color: #1c1c1a;
        }
        .q-context {
            font-size: 14px;
            color: #8a8985;
            margin-bottom: 18px;
            padding: 8px 0 8px 14px;
            border-left: 2px solid #d0ceca;
        }
        .scale-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0 4px;
            gap: 4px;
        }
        .scale-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            padding: 4px 0;
            transition: transform 0.1s;
        }
        .scale-item:active {
            transform: scale(0.92);
        }
        .scale-circle {
            border-radius: 50%;
            background: #f5f4f2;
            border: 2px solid #e0deda;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: #6b6a66;
            font-weight: 500;
            width: 44px;
            height: 44px;
        }
        .scale-item[data-level="1"] .scale-circle,
        .scale-item[data-level="7"] .scale-circle {
            width: 48px;
            height: 48px;
        }
        .scale-item[data-level="4"] .scale-circle {
            width: 34px;
            height: 34px;
            background: #fafaf9;
            border-color: #d0ceca;
        }
        .scale-item.selected .scale-circle {
            border-color: #7a8fa6;
            background: #7a8fa6;
            color: #fff;
            box-shadow: 0 0 0 4px rgba(122, 143, 166, 0.08);
        }
        .scale-label {
            font-size: 10px;
            color: #8a8985;
            margin-top: 6px;
            text-align: center;
            line-height: 1.2;
            min-height: 1.4em;
            font-weight: 400;
        }
        .scale-label.mid {
            color: #4a4a47;
            font-weight: 450;
        }
        .choice-options {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 6px;
        }
        .choice-btn {
            background: #fafaf9;
            border: 1px solid #e8e6e2;
            border-radius: 14px;
            padding: 14px 18px;
            font-size: 16px;
            color: #1c1c1a;
            cursor: pointer;
            transition: all 0.15s;
            text-align: left;
            font-weight: 400;
            line-height: 1.4;
        }
        .choice-btn:active {
            transform: scale(0.96);
            background: #f0efec;
        }
        .choice-btn.selected {
            border-color: #7a8fa6;
            background: #f5f7f8;
            box-shadow: 0 0 0 2px rgba(122, 143, 166, 0.06);
        }
        .choice-btn .label {
            font-weight: 500;
            color: #7a8fa6;
            margin-right: 10px;
        }
        .nav-area {
            display: flex;
            gap: 12px;
            margin-top: 18px;
        }
        .nav-btn {
            background: #f5f4f2;
            border: 1px solid #e0deda;
            padding: 12px 20px;
            border-radius: 40px;
            font-weight: 500;
            font-size: 15px;
            color: #4a4a47;
            cursor: pointer;
            flex: 1;
            transition: 0.15s;
            text-align: center;
        }
        .nav-btn:active {
            transform: scale(0.94);
            background: #eeedea;
        }
        .nav-btn:disabled {
            opacity: 0.2;
            pointer-events: none;
        }
        .nav-btn.primary {
            background: #7a8fa6;
            border-color: #7a8fa6;
            color: #fff;
        }
        .nav-btn.primary:active {
            opacity: 0.7;
        }
        .result-box {
            background: #ffffff;
            border-radius: 20px;
            padding: 32px 28px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.02);
            border: 1px solid #e8e6e2;
            display: none;
            animation: fadeUp 0.4s ease;
        }
        .result-box.show {
            display: block;
        }
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(16px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .result-title {
            font-size: 28px;
            font-weight: 600;
            letter-spacing: -0.01em;
        }
        .result-badge {
            display: inline-block;
            background: #f0efec;
            padding: 2px 18px;
            border-radius: 40px;
            font-size: 14px;
            color: #4a4a47;
            margin: 6px 0 10px;
        }
        .result-sub {
            font-size: 17px;
            color: #4a4a47;
            border-left: 3px solid #7a8fa6;
            padding-left: 16px;
            margin: 8px 0 22px;
            line-height: 1.6;
        }
        .result-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px 24px;
            margin: 16px 0 20px;
            padding: 14px 0;
            border-top: 1px solid #e8e6e2;
            border-bottom: 1px solid #e8e6e2;
        }
        .result-grid-item {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            color: #4a4a47;
            padding: 4px 0;
        }
        .result-grid-item .val {
            font-weight: 500;
            color: #1c1c1a;
        }
        .radar-container {
            display: flex;
            justify-content: center;
            margin: 16px 0 20px;
        }
        #radarCanvas {
            max-width: 100%;
            height: auto;
            border-radius: 12px;
            background: #fafaf9;
            border: 1px solid #e8e6e2;
        }
        .section {
            margin: 24px 0 14px;
        }
        .section h4 {
            font-size: 17px;
            font-weight: 600;
            color: #1c1c1a;
            margin-bottom: 6px;
            letter-spacing: -0.01em;
        }
        .section p,
        .section li {
            font-size: 15px;
            line-height: 1.9;
            color: #2a2a28;
        }
        .section ul {
            padding-left: 22px;
            margin: 4px 0;
        }
        .section ul li {
            margin-bottom: 4px;
        }
        .role-block {
            background: #fafaf9;
            border-radius: 14px;
            padding: 16px 20px;
            margin: 10px 0;
            border-left: 3px solid #7a8fa6;
        }
        .role-block strong {
            color: #1c1c1a;
        }
        .role-block .src {
            color: #6b6a66;
            font-size: 14px;
        }
        .result-actions {
            display: flex;
            gap: 12px;
            margin-top: 28px;
            flex-wrap: wrap;
        }
        .reset-btn {
            flex: 1;
            padding: 14px 20px;
            background: #f5f4f2;
            border: 1px solid #e0deda;
            border-radius: 60px;
            font-weight: 500;
            color: #4a4a47;
            cursor: pointer;
            font-size: 15px;
            transition: 0.15s;
            text-align: center;
            min-width: 120px;
        }
        .reset-btn:active {
            transform: scale(0.94);
            background: #eeedea;
        }
        .reset-btn.primary {
            background: #7a8fa6;
            border-color: #7a8fa6;
            color: #fff;
        }
        .reset-btn.primary:active {
            opacity: 0.7;
        }
        .footnote {
            font-size: 12px;
            color: #8a8985;
            text-align: center;
            margin-top: 24px;
            letter-spacing: 0.02em;
        }
        .hidden {
            display: none !important;
        }
        @media (max-width: 600px) {
            body {
                padding: 20px 14px 40px;
            }
            .header h1 {
                font-size: 26px;
            }
            .question-card {
                padding: 24px 18px;
            }
            .q-text {
                font-size: 18px;
            }
            .scale-circle {
                width: 36px !important;
                height: 36px !important;
            }
            .scale-item[data-level="1"] .scale-circle,
            .scale-item[data-level="7"] .scale-circle {
                width: 40px !important;
                height: 40px !important;
            }
            .scale-item[data-level="4"] .scale-circle {
                width: 28px !important;
                height: 28px !important;
            }
            .scale-label {
                font-size: 8px;
            }
            .result-grid {
                grid-template-columns: 1fr;
                gap: 2px;
            }
            .result-box {
                padding: 24px 16px;
            }
            .nav-btn {
                font-size: 14px;
                padding: 10px 12px;
            }
            .choice-btn {
                font-size: 15px;
                padding: 12px 14px;
            }
        }
        @media (max-width: 400px) {
            .scale-container {
                gap: 0;
            }
            .scale-label {
                font-size: 7px;
            }
            .scale-circle {
                width: 28px !important;
                height: 28px !important;
            }
            .scale-item[data-level="1"] .scale-circle,
            .scale-item[data-level="7"] .scale-circle {
                width: 32px !important;
                height: 32px !important;
            }
        }
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: #f0efec;
        }
        ::-webkit-scrollbar-thumb {
            background: #d0ceca;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <div class="top-bar">
                <div>
                    <h1 data-key="title">人格镜像</h1>
                    <p data-key="sub">情境投射 · 深度解析你的核心原型</p>
                </div>
                <div class="lang-toggle">
                    <button class="lang-btn active" data-lang="zh">中文</button>
                    <button class="lang-btn" data-lang="en">EN</button>
                </div>
            </div>
            <div class="progress-area"><div class="progress-fill" id="progressFill"></div></div>
            <div class="progress-stats">
                <span id="progressLabel">0 / 64</span>
                <span id="progressPercent">0%</span>
            </div>
        </div>

        <div id="questionCard">
            <div class="question-card">
                <div class="q-meta">
                    <span class="q-number" id="qNumber">第 1 题</span>
                    <span class="q-dimension" id="qDim">E/I</span>
                </div>
                <div class="q-text" id="qText">加载中…</div>
                <div class="q-context" id="qContext"></div>
                <div id="answerArea"></div>
            </div>
            <div class="nav-area">
                <button class="nav-btn" id="prevBtn">← 上一题</button>
                <button class="nav-btn primary" id="nextBtn">下一题 →</button>
            </div>
        </div>

        <div class="result-box" id="resultBox">
            <div class="result-title" id="resultTitle"></div>
            <div class="result-badge" id="resultBadge"></div>
            <div class="result-sub" id="resultSub"></div>
            <div class="result-grid" id="resultGrid"></div>
            <div class="radar-container"><canvas id="radarCanvas" width="400" height="400"></canvas></div>
            <div id="resultBars"></div>
            <div id="resultContent"></div>
            <div class="result-actions">
                <button class="reset-btn primary" id="resetBtn">↻ 重新测试</button>
                <button class="reset-btn" id="shareBtn">分享结果</button>
            </div>
        </div>
        <div class="footnote" data-key="footnote">基于 MBTI 框架 · 仅供自我探索</div>
    </div>

    <script>
        // ============================================================
        // I18N
        // ============================================================
        const I18N = {
            zh: {
                title: '人格镜像',
                sub: '情境投射 · 深度解析你的核心原型',
                prev: '← 上一题',
                next: '下一题 →',
                reset: '↻ 重新测试',
                share: '分享结果',
                footnote: '基于 MBTI 框架 · 仅供自我探索',
                view: '查看结果',
                scale: ['非常不符', '比较不符', '稍有不符', '中立', '稍有符合', '比较符合', '非常符合'],
                ctx: { EI: '能量来源：你更倾向于从外界还是内心获得动力？', SN: '信息处理：你更关注具体事实还是抽象可能？',
                    TF: '决策方式：你更依赖逻辑分析还是价值判断？', JP: '生活方式：你更喜欢计划确定还是灵活应变？' }
            },
            en: {
                title: 'Persona Mirror',
                sub: 'Situational Projection · Deep Archetype Analysis',
                prev: '← Previous',
                next: 'Next →',
                reset: '↻ Retake',
                share: 'Share Results',
                footnote: 'Based on MBTI · For self-exploration',
                view: 'View Results',
                scale: ['Strongly Disagree', 'Disagree', 'Slightly Disagree', 'Neutral', 'Slightly Agree', 'Agree',
                    'Strongly Agree'
                ],
                ctx: { EI: 'Energy: do you draw more from the outer world or within?', SN: 'Information: do you focus on facts or possibilities?',
                    TF: 'Decisions: do you rely on logic or values?', JP: 'Lifestyle: do you prefer structure or flexibility?' }
            }
        };

        // ============================================================
        // 题库 — 64道题（40道圈圈全部改写成陈述句）
        // ============================================================
        const QUESTIONS = (() => {
            const qs = [];
            const addScale = (zh, en, dim, key) => qs.push({ type: 'scale', zh, en, dim, key });
            const addChoice = (zh, en, opts_zh, opts_en, dim, key) => qs.push({ type: 'choice', zh, en, opts_zh,
                    opts_en, dim, key });

            // ---- E/I 圈圈 10 (全部改写成陈述句) ----
            addScale('周末你睡到自然醒，会先看手机有没有人找你，而不是翻个身再赖十分钟。', 'On a lazy weekend, you check your phone for messages rather than rolling over for ten more minutes.',
                'EI', 'E');
            addScale('你去一家新咖啡馆，会主动跟老板聊豆子产地，而不是默默点单坐到角落。',
                'At a new café, you chat with the barista about the beans rather than ordering quietly and sitting in the corner.',
                'EI', 'E');
            addScale('你更怕周末没人约，而不是怕有约。', 'You are more afraid of having no weekend plans than having too many.',
                'EI', 'E');
            addScale('在聚会上，你更常是那个“带节奏”的人，而不是“跟着节奏”的人。', 'At parties, you are the one setting the vibe rather than going with it.',
                'EI', 'E');
            addScale('你更享受在人群中做自己，而不是独处时做自己。', 'You feel more yourself in a crowd than when you\'re alone.',
                'EI', 'E');
            addScale('你更倾向于“走，出去转转”作为充电方式，而不是“让我一个人待会儿”。',
                'You recharge by going out rather than by being alone.', 'EI', 'E');
            addScale('你更容易在对话中发现自己想说的话，而不是在安静中整理出自己的想法。',
                'You find your thoughts more in conversation than in quiet.', 'EI', 'E');
            addScale('你更愿意跟一群人吃火锅，而不是跟一两个人吃日料。',
                'You would rather have hotpot with a big group than sushi with one or two friends.', 'EI', 'E');
            addScale('你更常是那个“主动发起群聊”的人，而不是“已读不回”的人。',
                'You are the one who starts group chats rather than the one who reads and ghosts.', 'EI', 'E');
            addScale('你更享受“被大家看到”的感觉，而不是“被少数人记住”的感觉。',
                'You enjoy being seen by many rather than being remembered by a few.', 'EI', 'E');

            // ---- S/N 圈圈 10 (全部改写成陈述句) ----
            addScale('你更擅长记住“上周二中午吃了什么”，而不是“五年前某个下午那种恍惚的感觉”。',
                'You are better at remembering what you ate last Tuesday than that vague feeling from an afternoon five years ago.',
                'SN', 'S');
            addScale('你看到一朵奇怪的云，第一反应是“像棉花糖”，而不是“要下雨了”。',
                'When you see a strange cloud, you think "cotton candy" rather than "it\'s gonna rain".', 'SN', 'S');
            addScale('你更愿意读一本纪实文学，而不是一本科幻小说。',
                'You would rather read a nonfiction book than a sci-fi novel.', 'SN', 'S');
            addScale('你更关注“这东西怎么用”，而不是“这背后有什么故事”。',
                'You focus more on "how it works" than "what\'s the story behind it".', 'SN', 'S');
            addScale('你更相信“眼见为实”，而不是“事出反常必有妖”。',
                'You trust "seeing is believing" more than "something\'s off if it\'s too normal".', 'SN', 'S');
            addScale('你更擅长“观察细节”，而不是“捕捉氛围”。',
                'You are better at noticing details than sensing the atmosphere.', 'SN', 'S');
            addScale('你更喜欢“按说明书操作”，而不是“先拆开看看再说”。',
                'You prefer following the manual rather than taking things apart first.', 'SN', 'S');
            addScale('你更常被朋友说“你观察力真强”，而不是“你脑洞真大”。',
                'You are more often told you have great observation skills than a wild imagination.', 'SN', 'S');
            addScale('你更享受“发现一个事实”，而不是“发现一个规律”。',
                'You enjoy discovering a fact more than discovering a pattern.', 'SN', 'S');
            addScale('你更相信“经验”，而不是“直觉”。', 'You trust experience more than intuition.', 'SN', 'S');

            // ---- T/F 圈圈 10 (全部改写成陈述句) ----
            addScale('朋友跟你吐槽时，你第一反应是“我帮你分析一下”，而不是“那你一定很难过”。',
                'When a friend vents, you first think "let me analyze this" rather than "that must be really hard".',
                'TF', 'T');
            addScale('你更怕被人说“你没逻辑”，而不是“你没感情”。',
                'You are more afraid of being called "illogical" than "cold".', 'TF', 'T');
            addScale('你更欣赏一场辩论中“最扎实的论据”，而不是“最真诚的表达”。',
                'In a debate, you appreciate the strongest argument more than the most sincere expression.', 'TF',
                'T');
            addScale('你更倾向于用数据说服别人，而不是用故事打动别人。',
                'You persuade more with data than with stories.', 'TF', 'T');
            addScale('你更看重“公正”，而不是“体谅”。', 'You value fairness more than compassion.', 'TF', 'T');
            addScale('你更容易被“逻辑错误”激怒，而不是“情感冷漠”。',
                'You are more irritated by logical fallacies than emotional detachment.', 'TF', 'T');
            addScale('你更常被形容为“冷静”，而不是“温暖”。',
                'You are more often described as "cool-headed" than "warm".', 'TF', 'T');
            addScale('你更愿意花时间“解决一个问题”，而不是“经营一段关系”。',
                'You would rather spend time solving a problem than nurturing a relationship.', 'TF', 'T');
            addScale('你更相信“道理”，而不是“感受”。', 'You trust reason more than feeling.', 'TF', 'T');
            addScale('你做决定时，更依赖“头脑”，而不是“内心”。',

        const qContext = document.getElementById('qContext');
        const answerArea = document.getElementById('answerArea');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const questionCard = document.getElementById('questionCard');
        const resultBox = document.getElementById('resultBox');
        const resultTitle = document.getElementById('resultTitle');
        const resultBadge = document.getElementById('resultBadge');
        const resultSub = document.getElementById('resultSub');
        const resultGrid = document.getElementById('resultGrid');
        const resultBars = document.getElementById('resultBars');
        const resultContent = document.getElementById('resultContent');
        const resetBtn = document.getElementById('resetBtn');
        const shareBtn = document.getElementById('shareBtn');
        const radarCanvas = document.getElementById('radarCanvas');

        function shuffleArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function getShuffledIndices() {
            if (shuffledIndices.length === 0) {
                shuffledIndices = Array.from({ length: QUESTIONS.length }, (_, i) => i);
                shuffleArray(shuffledIndices);
            }
            return shuffledIndices;
        }

        function getCurrentQuestion() {
            return QUESTIONS[getShuffledIndices()[currentIndex]];
        }

        function setLanguage(lang) {
            currentLang = lang;
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === lang));
            const t = I18N[lang];
            document.querySelector('[data-key="title"]').textContent = t.title;
            document.querySelector('[data-key="sub"]').textContent = t.sub;
            document.querySelector('[data-key="prev"]').textContent = t.prev;
            document.querySelector('[data-key="next"]').textContent = t.next;
            document.querySelector('[data-key="reset"]').textContent = t.reset;
            document.querySelector('[data-key="share"]').textContent = t.share;
            document.querySelector('[data-key="footnote"]').textContent = t.footnote;
            if (shareBtn) shareBtn.textContent = t.share || 'Share Results';
            updateProgressText();
            // ★ 修复：render 前保证 shuffledIndices 已生成
            if (shuffledIndices.length === 0) {
                getShuffledIndices();
            }
            renderQuestion();
            if (!resultBox.classList.contains('hidden')) {
                const allAnswered = answers.every(a => a !== null);
                if (allAnswered) showResult();
            }
        }

        function updateProgressText() {
            const answered = answers.filter(a => a !== null).length;
            const total = QUESTIONS.length;
            const pct = Math.round((answered / total) * 100);
            progressFill.style.width = pct + '%';
            progressLabel.textContent = `${answered} / ${total}`;
            progressPercent.textContent = `${pct}%`;
            const t = I18N[currentLang];
            if (answered === total) {
                nextBtn.textContent = t.view || 'View Results';
            } else {
                nextBtn.textContent = currentLang === 'zh' ? '下一题 →' : 'Next →';
            }
        }

        function renderScale(q, lang) {
            const labels = I18N[lang].scale;
            const currentVal = answers[currentIndex];
            let html = `<div class="scale-container">`;
            for (let i = 0; i < 7; i++) {
                const val = i + 1;
                const selected = (currentVal === val) ? 'selected' : '';
                const isMid = (val === 4) ? 'mid' : '';
                html += `<div class="scale-item ${selected}" data-level="${val}" data-index="${currentIndex}">
                            <div class="scale-circle">${val}</div>
                            <div class="scale-label ${isMid}">${labels[i]}</div>
                        </div>`;
            }
            html += `</div>`;
            answerArea.innerHTML = html;
            document.querySelectorAll('.scale-item').forEach(el => {
                el.addEventListener('click', function() {
                    const level = parseInt(this.dataset.level);
                    const idx = parseInt(this.dataset.index);
                    if (idx !== currentIndex) return;
                    if (answers[currentIndex] !== null) return;
                    answers[currentIndex] = level;
                    renderQuestion();
                    updateProgressText();
                    if (currentIndex < QUESTIONS.length - 1) {
                        setTimeout(() => goTo(currentIndex + 1), 160);
                    }
                });
            });
        }

        function renderChoice(q, lang) {
            const currentVal = answers[currentIndex];
            const opts = lang === 'zh' ? q.opts_zh : q.opts_en;
            const labels = ['A', 'B', 'C', 'D'];
            let html = `<div class="choice-options">`;
            opts.forEach((opt, idx) => {
                const selected = (currentVal === idx) ? 'selected' : '';
                const label = labels[idx] || '';
                html += `<div class="choice-btn ${selected}" data-opt-index="${idx}">
                            <span class="label">${label}.</span> ${opt}
                        </div>`;
            });
            html += `</div>`;
            answerArea.innerHTML = html;
            if (currentVal === null) {
                document.querySelectorAll('.choice-btn').forEach(el => {
                    el.addEventListener('click', function() {
                        const idx = parseInt(this.dataset.optIndex);
                        if (answers[currentIndex] !== null) return;
                        answers[currentIndex] = idx;
                        renderQuestion();
                        updateProgressText();
                        if (currentIndex < QUESTIONS.length - 1) {
                            setTimeout(() => goTo(currentIndex + 1), 280);
                        }
                    });
                });
            }
        }

        function renderQuestion() {
            const q = getCurrentQuestion();
            const lang = currentLang;
            const t = I18N[lang];
            const prefix = (lang === 'zh') ? '第 ' : 'Q';
            const suffix = (lang === 'zh') ? ' 题' : '';
            qNumber.textContent = `${prefix}${currentIndex+1}${suffix}`;
            const dimMap = { 'EI': 'E/I', 'SN': 'S/N', 'TF': 'T/F', 'JP': 'J/P' };
            qDim.textContent = dimMap[q.dim] || q.dim;
            qContext.textContent = (I18N[lang].ctx || {})[q.dim] || '';
            qText.textContent = lang === 'zh' ? q.zh : q.en;
            if (q.type === 'scale') renderScale(q, lang);
            else renderChoice(q, lang);
            updateProgressText();
            prevBtn.disabled = (currentIndex === 0);
            const allDone = answers.every(a => a !== null);
            if (currentIndex === QUESTIONS.length - 1) {
                if (allDone) {
                    nextBtn.textContent = t.view || 'View Results';
                    nextBtn.style.opacity = '1';
                    nextBtn.style.pointerEvents = 'auto';
                } else {
                    nextBtn.textContent = lang === 'zh' ? '完成全部题目' : 'Complete all';
                    nextBtn.style.opacity = '0.5';
                    nextBtn.style.pointerEvents = 'none';
                }
            } else {
                nextBtn.textContent = t.next || 'Next →';
                nextBtn.style.opacity = '1';
                nextBtn.style.pointerEvents = 'auto';
            }
        }

        function goTo(index) {
            if (index < 0 || index >= QUESTIONS.length) return;
            currentIndex = index;
            renderQuestion();
            document.querySelector('.question-card').scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        // ---- 官方计分逻辑 ----
        function computeMBTI() {
            let E = 0,
                I = 0,
                S = 0,
                N = 0,
                T = 0,
                F = 0,
                J = 0,
                P = 0;

            for (let i = 0; i < QUESTIONS.length; i++) {
                const val = answers[i];
                if (val === null) continue;
                const q = QUESTIONS[getShuffledIndices()[i]];
                let score = 0;
                if (q.type === 'scale') score = val - 4;
                else score = (val === 0) ? 3 : -3;

                const dim = q.dim,
                    key = q.key;
                if (dim === 'EI') {
                    if (key === 'E') E += score;
                    else I += score;
                } else if (dim === 'SN') {
                    if (key === 'S') S += score;
                    else N += score;
                } else if (dim === 'TF') {
                    if (key === 'T') T += score;
                    else F += score;
                } else if (dim === 'JP') {
                    if (key === 'J') J += score;
                    else P += score;
                }
            }

            function normScore(pos, neg, count) {
                if (count === 0) return 0;
                const maxPerQ = 3;
                const maxPossible = count * maxPerQ * 2;
                const raw = (pos - neg) / maxPossible * 20;
                return Math.max(-10, Math.min(10, raw));
            }

            const totalCount = 16;
            const eScore = normScore(E, I, totalCount);
            const sScore = normScore(S, N, totalCount);
            const tScore = normScore(T, F, totalCount);
            const jScore = normScore(J, P, totalCount);

            const dimE = eScore < 0 ? 'E' : 'I';
            const dimS = sScore < 0 ? 'S' : 'N';
            const dimT = tScore < 0 ? 'T' : 'F';
            const dimJ = jScore < 0 ? 'J' : 'P';

            const pE = (eScore + 10) / 20 * 100;
            const pI = 100 - pE;
            const pS = (sScore + 10) / 20 * 100;
            const pN = 100 - pS;
            const pT = (tScore + 10) / 20 * 100;
            const pF = 100 - pT;
            const pJ = (jScore + 10) / 20 * 100;
            const pP = 100 - pJ;

            return {
                mbti: dimE + dimS + dimT + dimJ,
                eScore: eScore.toFixed(1),
                iScore: (-eScore).toFixed(1),
                sScore: sScore.toFixed(1),
                nScore: (-sScore).toFixed(1),
                tScore: tScore.toFixed(1),
                fScore: (-tScore).toFixed(1),
                jScore: jScore.toFixed(1),
                pScore: (-jScore).toFixed(1),
                pE, pI, pS, pN, pT, pF, pJ, pP
            };
        }

        // ---- 雷达图 ----
        function drawRadar(scores) {
            const ctx = radarCanvas.getContext('2d');
            const w = radarCanvas.width,
                h = radarCanvas.height;
            const cx = w / 2,
                cy = h / 2;
            const radius = Math.min(w, h) / 2 - 50;
            const labels = ['E', 'I', 'S', 'N', 'T', 'F', 'J', 'P'];
            const values = [scores.pE, scores.pI, scores.pS, scores.pN, scores.pT, scores.pF, scores.pJ, scores.pP];
            const angles = labels.map((_, i) => (i / labels.length) * 2 * Math.PI - Math.PI / 2);

            ctx.clearRect(0, 0, w, h);
            ctx.strokeStyle = '#d0ceca';
            ctx.lineWidth = 0.5;

            for (let ring = 1; ring <= 4; ring++) {
                const r = (radius / 4) * ring;
                ctx.beginPath();
                for (let i = 0; i < labels.length; i++) {
                    const x = cx + r * Math.cos(angles[i]);
                    const y = cy + r * Math.sin(angles[i]);
                    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
                }
                ctx.closePath();
                ctx.stroke();
            }

            for (let i = 0; i < labels.length; i++) {
                const x = cx + radius * Math.cos(angles[i]);
                const y = cy + radius * Math.sin(angles[i]);
                ctx.beginPath();
                ctx.moveTo(cx, cy);
                ctx.lineTo(x, y);
                ctx.stroke();
                const lx = cx + (radius + 20) * Math.cos(angles[i]);
                const ly = cy + (radius + 20) * Math.sin(angles[i]);
                ctx.fillStyle = '#4a4a47';
                ctx.font = '12px Inter, sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(labels[i], lx, ly);
            }

            ctx.beginPath();
            for (let i = 0; i < labels.length; i++) {
                const r = (values[i] / 100) * radius;
                const x = cx + r * Math.cos(angles[i]);
                const y = cy + r * Math.sin(angles[i]);
                i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
            }
            ctx.closePath();
            ctx.fillStyle = 'rgba(122, 143, 166, 0.15)';
            ctx.fill();
            ctx.strokeStyle = '#7a8fa6';
            ctx.lineWidth = 2;
            ctx.stroke();

            for (let i = 0; i < labels.length; i++) {
                const r = (values[i] / 100) * radius;
                const x = cx + r * Math.cos(angles[i]);
                const y = cy + r * Math.sin(angles[i]);
                ctx.beginPath();
                ctx.arc(x, y, 4, 0, 2 * Math.PI);
                ctx.fillStyle = '#7a8fa6';
                ctx.fill();
            }
        }

        // ---- 结果展示 ----
        function showResult() {
            if (answers.some(a => a === null)) {
                alert(currentLang === 'zh' ? '请完成全部64题' : 'Please complete all 64 questions');
                return;
            }
            const res = computeMBTI();
            const { mbti, pE, pI, pS, pN, pT, pF, pJ, pP, eScore, iScore, sScore, nScore, tScore, fScore, jScore,
                pScore } = res;
            let profile = PROFILES[mbti];
            if (!profile) {
                const fallbackMap = {
                    'INTJ': 'INTJ',
                    'INTP': 'INTP',
                    'ENTJ': 'ENTJ',
                    'ENTP': 'ENTP',
                    'INFJ': 'INFJ',
                    'INFP': 'INFP',
                    'ENFJ': 'ENFJ',
                    'ENFP': 'ENFP',
                    'ISTJ': 'ISTJ',
                    'ISFJ': 'ISFJ',
                    'ESTJ': 'ESTJ',
                    'ESFJ': 'ESFJ',
                    'ISTP': 'ISTP',
                    'ISFP': 'ISFP',
                    'ESTP': 'ESTP',
                    'ESFP': 'ESFP'
                };
                const fallbackKey = fallbackMap[mbti] || 'INTJ';
                profile = PROFILES[fallbackKey];
                if (!profile) {
                    alert(currentLang === 'zh' ? '未找到人格档案' : 'Profile not found');
                    return;
                }
            }
            const lang = currentLang;
            const data = profile[lang] || profile.zh;

            resultTitle.textContent = data.title || mbti;
            resultBadge.textContent = data.badge || '';
            resultSub.textContent = data.desc || '';

            const gridData = [
                ['E', eScore, 'I', iScore],
                ['S', sScore, 'N', nScore],
                ['T', tScore, 'F', fScore],
                ['J', jScore, 'P', pScore]
            ];
            let gridHtml = '';
            gridData.forEach(([l, lv, r, rv]) => {
                gridHtml +=
                    `<div class="result-grid-item"><span>${l} <span class="val">${lv}</span></span><span>${r} <span class="val">${rv}</span></span></div>`;
            });
            resultGrid.innerHTML = gridHtml;

            drawRadar({ pE, pI, pS, pN, pT, pF, pJ, pP });

            const bars = [
                { label: 'E / I', left: `E ${pE.toFixed(1)}%`, right: `I ${pI.toFixed(1)}%`, pct: pE },
                { label: 'S / N', left: `S ${pS.toFixed(1)}%`, right: `N ${pN.toFixed(1)}%`, pct: pS },
                { label: 'T / F', left: `T ${pT.toFixed(1)}%`, right: `F ${pF.toFixed(1)}%`, pct: pT },
                { label: 'J / P', left: `J ${pJ.toFixed(1)}%`, right: `P ${pP.toFixed(1)}%`, pct: pJ }
            ];
            let barHtml = '';
            bars.forEach(b => {
                barHtml += `<div class="dimension-bar">
                            <div class="dimension-label"><span>${b.left}</span><span>${b.right}</span></div>
                            <div class="bar-track"><div class="bar-fill" style="width:${b.pct}%;"></div></div>
                        </div>`;
            });
            resultBars.innerHTML = barHtml;

            let detailHtml = `
                        <div class="section"><h4>人格概述</h4><p>${data.overview || ''}</p></div>
                        <div class="section"><h4>核心优势</h4><ul>${(data.strengths||[]).map(s=>`<li>${s}</li>`).join('')}</ul></div>
                        <div class="section"><h4>潜在盲点</h4><ul>${(data.blindspots||[]).map(b=>`<li>${b}</li>`).join('')}</ul></div>
                        <div class="section"><h4>适合领域</h4><p>${data.suitable||''}</p></div>
                        <div class="section"><h4>成长建议</h4><p>${data.growth||''}</p></div>
                        <div class="section"><h4>人际风格</h4><p>${data.relationships||''}</p></div>
                        <div class="section"><h4>压力反应</h4><p>${data.stress||''}</p></div>
                        <div class="section"><h4>工作风格</h4><p>${data.work||''}</p></div>
                        <div class="section"><h4>总结</h4><p>${data.summary||''}</p></div>
                    `;

            if (data.enneagram) {
                detailHtml += `<div class="section"><h4>九型人格分系</h4>`;
                const keys = Object.keys(data.enneagram);
                keys.forEach(k => {
                    detailHtml += `<p style="margin-bottom:10px;"><strong>${k}型</strong> ${data.enneagram[k]}</p>`;
                });
                detailHtml += `</div>`;
            }

            if (data.subtypes) {
                detailHtml += `<div class="section"><h4>四种子类型（Dario Nardi）</h4>`;
                const st = data.subtypes;
                for (let key in st) {
                    detailHtml += `<p style="margin-bottom:10px;"><strong>${key}</strong> ${st[key]}</p>`;
                }
                detailHtml += `</div>`;
            }

            if (data.functions) {
                detailHtml += `<div class="section"><h4>认知功能栈</h4>`;
                const fn = data.functions;
                const labels = { dominant: '主导功能', auxiliary: '辅助功能', tertiary: '第三功能', inferior: '劣势功能' };
                for (let key in fn) {
                    detailHtml +=
                        `<p style="margin-bottom:10px;"><strong>${labels[key]||key}</strong> ${fn[key]}</p>`;
                }
                detailHtml += `</div>`;
            }

            if (data.temperament) {
                detailHtml += `<div class="section"><h4>气质类型</h4><p>${data.temperament}</p></div>`;
            }

            if (data.role_west && data.role_east) {
                detailHtml += `
                            <div class="section"><h4>你的人格角色</h4>
                                <div class="role-block"><strong>西方角色：${data.role_west.name}</strong> <span class="src">— ${data.role_west.source}</span><br>${data.role_west.match}<br><br><span style="color:#6b6a66;font-size:14px;">${data.role_west.detail || ''}</span></div>
                                <div class="role-block"><strong>中国经典角色：${data.role_east.name}</strong> <span class="src">— ${data.role_east.source}</span><br>${data.role_east.match}<br><br><span style="color:#6b6a66;font-size:14px;">${data.role_east.detail || ''}</span></div>
                            </div>
                        `;
            }

            if (data.match_basis) {
                detailHtml += `<div class="section"><h4>匹配依据</h4><p>${data.match_basis}</p></div>`;
            }

            resultContent.innerHTML = detailHtml;
            questionCard.classList.add('hidden');
            resultBox.classList.add('show');
            setTimeout(() => resultBox.scrollIntoView({ behavior: 'smooth', block: 'start' }), 150);
        }

        function resetTest() {
            answers = new Array(QUESTIONS.length).fill(null);
            currentIndex = 0;
            shuffledIndices = [];
            resultBox.classList.remove('show');
            questionCard.classList.remove('hidden');
            renderQuestion();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function shareResult() {
            const res = computeMBTI();
            const mbti = res.mbti;
            const profile = PROFILES[mbti];
            if (!profile) return;
            const data = profile[currentLang] || profile.zh;
            const title = data.title || mbti;
            const url = window.location.href;
            const text = currentLang === 'zh' ? `我测出了 ${title}！你的隐藏人格角色是什么？来测测看 👉` :
                `I got ${title}! What's your hidden persona? Take the test 👉`;
            if (navigator.share) {
                navigator.share({ title: currentLang === 'zh' ? '人格镜像' : 'Persona Mirror', text, url }).catch(() => {});
            } else if (navigator.clipboard) {
                navigator.clipboard.writeText(`${text} ${url}`).then(() => {
                    alert(currentLang === 'zh' ? '结果链接已复制！' : 'Link copied!');
                }).catch(() => {
                    prompt(currentLang === 'zh' ? '复制以下链接分享：' : 'Copy this link:', `${text} ${url}`);
                });
            } else {
                prompt(currentLang === 'zh' ? '复制以下链接分享：' : 'Copy this link:', `${text} ${url}`);
            }
        }

        // ---- 事件绑定 ----
        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const lang = btn.dataset.lang;
                setLanguage(lang);
                localStorage.setItem('mbti_lang', lang);
            });
        });
        prevBtn.addEventListener('click', () => goTo(currentIndex - 1));
        nextBtn.addEventListener('click', () => {
            if (currentIndex === QUESTIONS.length - 1) showResult();
            else goTo(currentIndex + 1);
        });
        resetBtn.addEventListener('click', resetTest);
        if (shareBtn) shareBtn.addEventListener('click', shareResult);

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft' && !prevBtn.disabled) prevBtn.click();
            else if (e.key === 'ArrowRight' && !nextBtn.disabled) nextBtn.click();
        });

        // ---- 初始化 - 修复加载中bug ----
        const savedLang = localStorage.getItem('mbti_lang') || 'zh';
        // ★ 关键修复：先强制洗牌，再设置语言并渲染
        getShuffledIndices();
        setLanguage(savedLang);
    </script>
</body>
